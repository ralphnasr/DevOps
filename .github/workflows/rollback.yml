name: Rollback Production

# Manual rollback to a previous ECS task definition revision.
# Per docs/phase2-master-plan.md §9.4 (Option A: ECS task definition revert).
#
# How to use:
#   1. Go to Actions → "Rollback Production" → Run workflow
#   2. Pick the service (catalog | cart | checkout | admin | all)
#   3. Enter the revision number to roll back to (e.g. 42)
#      Find it via: aws ecs list-task-definitions --family-prefix shopcloud-prod-<service>
#   4. Run. The workflow waits for services-stable and reports.

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to roll back (catalog/cart/checkout/admin/all)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - catalog
          - cart
          - checkout
          - admin
      revision:
        description: "Task definition revision number to roll back to (use 'previous' for last stable)"
        required: true
        default: "previous"
        type: string
      reason:
        description: "Reason for rollback (audit trail)"
        required: true
        type: string

env:
  AWS_REGION: us-east-1
  CLUSTER: shopcloud-prod

permissions:
  id-token: write
  contents: read

jobs:
  rollback:
    name: Roll back ECS service(s)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve services to roll back
        id: svc
        run: |
          if [[ "${{ inputs.service }}" == "all" ]]; then
            echo "list=catalog cart checkout admin" >> "$GITHUB_OUTPUT"
          else
            echo "list=${{ inputs.service }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Roll back each service
        env:
          REVISION_INPUT: ${{ inputs.revision }}
        run: |
          set -euo pipefail
          for svc in ${{ steps.svc.outputs.list }}; do
            family="shopcloud-prod-${svc}"

            if [[ "$REVISION_INPUT" == "previous" ]]; then
              # pick second-most-recent ACTIVE revision (current is :1)
              revision=$(aws ecs list-task-definitions \
                --family-prefix "$family" \
                --status ACTIVE \
                --sort DESC \
                --query 'taskDefinitionArns[1]' \
                --output text)
              if [[ "$revision" == "None" || -z "$revision" ]]; then
                echo "ERROR: no previous revision found for ${family}"
                exit 1
              fi
              task_def="$revision"
            else
              task_def="${family}:${REVISION_INPUT}"
            fi

            echo "Rolling ${svc} back to ${task_def}"
            aws ecs update-service \
              --cluster "$CLUSTER" \
              --service "$svc" \
              --task-definition "$task_def" \
              --force-new-deployment \
              --no-cli-pager
          done

      - name: Wait for services-stable
        run: |
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services ${{ steps.svc.outputs.list }} \
            --no-cli-pager

      - name: Post-rollback health check
        run: |
          set -euo pipefail
          alb=$(cd terraform && terraform output -raw prod_alb_dns 2>/dev/null || echo "")
          if [[ -z "$alb" ]]; then
            echo "WARN: prod_alb_dns output unavailable in this checkout — skipping smoke test"
            exit 0
          fi
          for svc in ${{ steps.svc.outputs.list }}; do
            echo "Probing /health on ${svc} via ${alb}"
            curl -fsS --max-time 10 "http://${alb}/${svc}/health" \
              || curl -fsS --max-time 10 "http://${alb}/health"
          done

      - name: Summary
        run: |
          echo "### Rollback complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Services:** ${{ steps.svc.outputs.list }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Revision:** ${{ inputs.revision }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Reason:**   ${{ inputs.reason }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Actor:**    @${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
