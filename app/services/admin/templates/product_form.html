{% extends "base.html" %}
{% set active_page = "products" %}

{% block title %}{{ "Edit" if product else "New" }} Product - ShopCloud Admin{% endblock %}

{% block content %}
<div class="header">
    <h1>{{ "Edit" if product else "New" }} Product</h1>
</div>

<div class="card">
    <form method="post" action="{% if product %}/admin/products/{{ product.id }}{% else %}/admin/products{% endif %}">
        <div class="form-group">
            <label for="name">Product Name *</label>
            <input type="text" id="name" name="name" required value="{{ product.name if product else '' }}">
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description">{{ product.description if product else '' }}</textarea>
        </div>

        <div class="form-group">
            <label for="price">Price *</label>
            <input type="number" id="price" name="price" step="0.01" min="0" required
                   value="{{ product.price if product else '' }}">
        </div>

        <div class="form-group">
            <label for="category_id">Category</label>
            <select id="category_id" name="category_id">
                <option value="">-- No Category --</option>
                {% for cat in categories %}
                <option value="{{ cat.id }}"
                    {% if product and product.category_id == cat.id %}selected{% endif %}>
                    {{ cat.name }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="image_url">Image URL</label>
            <input type="text" id="image_url" name="image_url"
                   value="{{ product.image_url if product and product.image_url else '' }}">
        </div>

        <div class="form-group">
            <label for="stock_quantity">Stock Quantity</label>
            <input type="number" id="stock_quantity" name="stock_quantity" min="0"
                   value="{{ product.stock_quantity if product else 0 }}">
        </div>

        {% if product %}
        <div class="form-group">
            <label>
                <input type="checkbox" name="is_active" {% if product.is_active %}checked{% endif %}> Active
            </label>
        </div>
        {% endif %}

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button type="submit" class="btn btn-primary">{{ "Update" if product else "Create" }} Product</button>
            <a href="/admin/products" class="btn">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
