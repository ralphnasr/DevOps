<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - ShopCloud</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
        <a href="index.html" class="logo">Shop<span>Cloud</span></a>
        <button class="hamburger" onclick="toggleMobileMenu()" aria-label="Menu"><span></span><span></span><span></span></button>
        <nav class="nav-links">
            <a href="index.html" data-nav="shop">Shop All</a>
            <a href="index.html?filter=new" data-nav="new">New Arrivals</a>
            <a href="index.html?filter=best-sellers" data-nav="best">Best Sellers</a>
            <a href="contact.html" data-nav="about">About</a>
        </nav>
        <form class="nav-search" onsubmit="submitNavSearch(event)">
            <span class="search-glyph"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
            <input type="text" id="nav-search-input" placeholder="Search products..." autocomplete="off">
        </form>
        <div class="nav-icons">
            <a href="orders.html" class="nav-icon-btn" title="Orders" aria-label="Orders"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></a>
            <a href="wishlist.html" class="nav-icon-btn" title="Wishlist" aria-label="Wishlist"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span id="wishlist-badge" class="cart-badge" style="display:none">0</span></a>
            <a href="cart.html" class="nav-icon-btn cart-link" title="Cart" aria-label="Cart"><svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span id="cart-badge" class="cart-badge" style="display:none">0</span></a>
            <a href="account.html" class="nav-icon-btn" id="account-link" title="Account" aria-label="Account" style="display:none"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></a>
            <a href="login.html" id="login-btn" class="btn btn-accent btn-sm" style="margin-left:8px;">Login</a>
            <a href="#" id="logout-btn" class="btn btn-outline btn-sm" style="display:none;margin-left:8px;" onclick="logout(); return false;">Logout</a>
        </div>
    </header>
    <div class="category-strip"><div class="category-strip-inner" id="category-strip"></div></div>

    <div class="container">
        <div class="error-page">
            <div class="error-code">404</div>
            <h1>Page Not Found</h1>
            <p>The page you're looking for doesn't exist or has been moved.</p>
            <div class="error-actions">
                <a href="index.html" class="btn btn-primary btn-lg">Back to Shop</a>
                <a href="contact.html" class="btn btn-outline btn-lg">Contact Support</a>
            </div>
            <div class="error-suggestions">
                <h3>Try these instead:</h3>
                <div class="suggestion-links">
                    <a href="index.html">Browse Products</a>
                    <a href="cart.html">View Cart</a>
                    <a href="orders.html">My Orders</a>
                    <a href="account.html">My Account</a>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-main">
        <div class="footer-bottom"><p>&copy; 2026 ShopCloud. All rights reserved.</p></div>
    </footer>

    <div id="mobile-overlay" class="mobile-overlay" onclick="closeMobileMenu()"></div>
    <div id="toast-container" class="toast-container"></div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/wishlist.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            updateAuthUI();
            updateWishlistBadge();
        });
    </script>
</body>
</html>
